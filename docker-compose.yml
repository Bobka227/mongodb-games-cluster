services:
  cfg1:
    image: mongo:8.0
    container_name: cfg1
    command: mongod --configsvr --replSet cfgRS --port 27019 --bind_ip_all
    volumes:
      - cfg1_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--port", "27019", "--eval", "db.adminCommand({ ping: 1 })"]
      interval: 10s
      timeout: 5s
      retries: 20

  cfg2:
    image: mongo:8.0
    container_name: cfg2
    command: mongod --configsvr --replSet cfgRS --port 27019 --bind_ip_all
    volumes:
      - cfg2_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--port", "27019", "--eval", "db.adminCommand({ ping: 1 })"]
      interval: 10s
      timeout: 5s
      retries: 20

  cfg3:
    image: mongo:8.0
    container_name: cfg3
    command: mongod --configsvr --replSet cfgRS --port 27019 --bind_ip_all
    volumes:
      - cfg3_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--port", "27019", "--eval", "db.adminCommand({ ping: 1 })"]
      interval: 10s
      timeout: 5s
      retries: 20

  s1a:
    image: mongo:8.0
    container_name: s1a
    command: mongod --shardsvr --replSet shard1RS --port 27018 --bind_ip_all
    volumes:
      - s1a_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--port", "27018", "--eval", "db.adminCommand({ ping: 1 })"]
      interval: 10s
      timeout: 5s
      retries: 20

  s1b:
    image: mongo:8.0
    container_name: s1b
    command: mongod --shardsvr --replSet shard1RS --port 27018 --bind_ip_all
    volumes:
      - s1b_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--port", "27018", "--eval", "db.adminCommand({ ping: 1 })"]
      interval: 10s
      timeout: 5s
      retries: 20

  s1c:
    image: mongo:8.0
    container_name: s1c
    command: mongod --shardsvr --replSet shard1RS --port 27018 --bind_ip_all
    volumes:
      - s1c_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--port", "27018", "--eval", "db.adminCommand({ ping: 1 })"]
      interval: 10s
      timeout: 5s
      retries: 20

  s2a:
    image: mongo:8.0
    container_name: s2a
    command: mongod --shardsvr --replSet shard2RS --port 27018 --bind_ip_all
    volumes:
      - s2a_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--port", "27018", "--eval", "db.adminCommand({ ping: 1 })"]
      interval: 10s
      timeout: 5s
      retries: 20

  s2b:
    image: mongo:8.0
    container_name: s2b
    command: mongod --shardsvr --replSet shard2RS --port 27018 --bind_ip_all
    volumes:
      - s2b_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--port", "27018", "--eval", "db.adminCommand({ ping: 1 })"]
      interval: 10s
      timeout: 5s
      retries: 20

  s2c:
    image: mongo:8.0
    container_name: s2c
    command: mongod --shardsvr --replSet shard2RS --port 27018 --bind_ip_all
    volumes:
      - s2c_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--port", "27018", "--eval", "db.adminCommand({ ping: 1 })"]
      interval: 10s
      timeout: 5s
      retries: 20

  s3a:
    image: mongo:8.0
    container_name: s3a
    command: mongod --shardsvr --replSet shard3RS --port 27018 --bind_ip_all
    volumes:
      - s3a_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--port", "27018", "--eval", "db.adminCommand({ ping: 1 })"]
      interval: 10s
      timeout: 5s
      retries: 20

  s3b:
    image: mongo:8.0
    container_name: s3b
    command: mongod --shardsvr --replSet shard3RS --port 27018 --bind_ip_all
    volumes:
      - s3b_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--port", "27018", "--eval", "db.adminCommand({ ping: 1 })"]
      interval: 10s
      timeout: 5s
      retries: 20

  s3c:
    image: mongo:8.0
    container_name: s3c
    command: mongod --shardsvr --replSet shard3RS --port 27018 --bind_ip_all
    volumes:
      - s3c_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--port", "27018", "--eval", "db.adminCommand({ ping: 1 })"]
      interval: 10s
      timeout: 5s
      retries: 20

  mongos:
    image: mongo:8.0
    container_name: mongos
    depends_on:
      - cfg1
      - cfg2
      - cfg3
    command: mongos --configdb cfgRS/cfg1:27019,cfg2:27019,cfg3:27019 --bind_ip_all --port 27017
    ports:
      - "27017:27017"
    volumes:
      - ./data:/import:ro
    healthcheck:
      test: ["CMD", "mongosh", "--port", "27017", "--eval", "db.adminCommand({ ping: 1 })"]
      interval: 10s
      timeout: 5s
      retries: 20

  setup:
    image: mongo:8.0
    container_name: mongo-setup
    depends_on:
      - cfg1
      - cfg2
      - cfg3
      - s1a
      - s1b
      - s1c
      - s2a
      - s2b
      - s2c
      - s3a
      - s3b
      - s3c
      - mongos
    volumes:
      - ./scripts/setup-cluster.sh:/scripts/setup-cluster.sh:ro
      - ./mongo-init:/mongo-init:ro
      - ./data:/import:ro
    entrypoint: ["/bin/bash", "/scripts/setup-cluster.sh"]

volumes:
  cfg1_data:
  cfg2_data:
  cfg3_data:
  s1a_data:
  s1b_data:
  s1c_data:
  s2a_data:
  s2b_data:
  s2c_data:
  s3a_data:
  s3b_data:
  s3c_data: