services:
  cfg1:
    image: mongo:8.0
    container_name: cfg1
    entrypoint: ["/bin/bash", "/scripts/init-primary.sh"]
    command: ["mongod", "--configsvr", "--replSet", "cfgRS", "--port", "27019", "--bind_ip_all", "--keyFile", "/etc/mongo/keyfile"]
    environment:
      MONGOD_PORT: "27019"
      MONGO_ADMIN_USER: "${MONGO_ADMIN_USER}"
      MONGO_ADMIN_PASSWORD: "${MONGO_ADMIN_PASSWORD}"
      RS_NAME: "cfgRS"
      RS_MEMBERS: "cfg1:27019,cfg2:27019,cfg3:27019"
      IS_CONFIGSVR: "true"
    volumes:
      - cfg1_data:/data/db
      - ./secrets/keyfile:/run/secrets/keyfile:ro
      - ./scripts:/scripts:ro

  cfg2:
    image: mongo:8.0
    container_name: cfg2
    entrypoint: ["/bin/bash", "/scripts/setup-keyfile.sh"]
    command: ["mongod", "--configsvr", "--replSet", "cfgRS", "--port", "27019", "--bind_ip_all", "--keyFile", "/etc/mongo/keyfile"]
    volumes:
      - cfg2_data:/data/db
      - ./secrets/keyfile:/run/secrets/keyfile:ro
      - ./scripts:/scripts:ro

  cfg3:
    image: mongo:8.0
    container_name: cfg3
    entrypoint: ["/bin/bash", "/scripts/setup-keyfile.sh"]
    command: ["mongod", "--configsvr", "--replSet", "cfgRS", "--port", "27019", "--bind_ip_all", "--keyFile", "/etc/mongo/keyfile"]
    volumes:
      - cfg3_data:/data/db
      - ./secrets/keyfile:/run/secrets/keyfile:ro
      - ./scripts:/scripts:ro

  s1a:
    image: mongo:8.0
    container_name: s1a
    entrypoint: ["/bin/bash", "/scripts/init-primary.sh"]
    command: ["mongod", "--shardsvr", "--replSet", "shard1RS", "--port", "27018", "--bind_ip_all", "--keyFile", "/etc/mongo/keyfile"]
    environment:
      MONGOD_PORT: "27018"
      MONGO_ADMIN_USER: "${MONGO_ADMIN_USER}"
      MONGO_ADMIN_PASSWORD: "${MONGO_ADMIN_PASSWORD}"
      RS_NAME: "shard1RS"
      RS_MEMBERS: "s1a:27018,s1b:27018,s1c:27018"
    volumes:
      - s1a_data:/data/db
      - ./secrets/keyfile:/run/secrets/keyfile:ro
      - ./scripts:/scripts:ro

  s1b:
    image: mongo:8.0
    container_name: s1b
    entrypoint: ["/bin/bash", "/scripts/setup-keyfile.sh"]
    command: ["mongod", "--shardsvr", "--replSet", "shard1RS", "--port", "27018", "--bind_ip_all", "--keyFile", "/etc/mongo/keyfile"]
    volumes:
      - s1b_data:/data/db
      - ./secrets/keyfile:/run/secrets/keyfile:ro
      - ./scripts:/scripts:ro

  s1c:
    image: mongo:8.0
    container_name: s1c
    entrypoint: ["/bin/bash", "/scripts/setup-keyfile.sh"]
    command: ["mongod", "--shardsvr", "--replSet", "shard1RS", "--port", "27018", "--bind_ip_all", "--keyFile", "/etc/mongo/keyfile"]
    volumes:
      - s1c_data:/data/db
      - ./secrets/keyfile:/run/secrets/keyfile:ro
      - ./scripts:/scripts:ro

  s2a:
    image: mongo:8.0
    container_name: s2a
    entrypoint: ["/bin/bash", "/scripts/init-primary.sh"]
    command: ["mongod", "--shardsvr", "--replSet", "shard2RS", "--port", "27018", "--bind_ip_all", "--keyFile", "/etc/mongo/keyfile"]
    environment:
      MONGOD_PORT: "27018"
      MONGO_ADMIN_USER: "${MONGO_ADMIN_USER}"
      MONGO_ADMIN_PASSWORD: "${MONGO_ADMIN_PASSWORD}"
      RS_NAME: "shard2RS"
      RS_MEMBERS: "s2a:27018,s2b:27018,s2c:27018"
    volumes:
      - s2a_data:/data/db
      - ./secrets/keyfile:/run/secrets/keyfile:ro
      - ./scripts:/scripts:ro

  s2b:
    image: mongo:8.0
    container_name: s2b
    entrypoint: ["/bin/bash", "/scripts/setup-keyfile.sh"]
    command: ["mongod", "--shardsvr", "--replSet", "shard2RS", "--port", "27018", "--bind_ip_all", "--keyFile", "/etc/mongo/keyfile"]
    volumes:
      - s2b_data:/data/db
      - ./secrets/keyfile:/run/secrets/keyfile:ro
      - ./scripts:/scripts:ro

  s2c:
    image: mongo:8.0
    container_name: s2c
    entrypoint: ["/bin/bash", "/scripts/setup-keyfile.sh"]
    command: ["mongod", "--shardsvr", "--replSet", "shard2RS", "--port", "27018", "--bind_ip_all", "--keyFile", "/etc/mongo/keyfile"]
    volumes:
      - s2c_data:/data/db
      - ./secrets/keyfile:/run/secrets/keyfile:ro
      - ./scripts:/scripts:ro

  s3a:
    image: mongo:8.0
    container_name: s3a
    entrypoint: ["/bin/bash", "/scripts/init-primary.sh"]
    command: ["mongod", "--shardsvr", "--replSet", "shard3RS", "--port", "27018", "--bind_ip_all", "--keyFile", "/etc/mongo/keyfile"]
    environment:
      MONGOD_PORT: "27018"
      MONGO_ADMIN_USER: "${MONGO_ADMIN_USER}"
      MONGO_ADMIN_PASSWORD: "${MONGO_ADMIN_PASSWORD}"
      RS_NAME: "shard3RS"
      RS_MEMBERS: "s3a:27018,s3b:27018,s3c:27018"
    volumes:
      - s3a_data:/data/db
      - ./secrets/keyfile:/run/secrets/keyfile:ro
      - ./scripts:/scripts:ro

  s3b:
    image: mongo:8.0
    container_name: s3b
    entrypoint: ["/bin/bash", "/scripts/setup-keyfile.sh"]
    command: ["mongod", "--shardsvr", "--replSet", "shard3RS", "--port", "27018", "--bind_ip_all", "--keyFile", "/etc/mongo/keyfile"]
    volumes:
      - s3b_data:/data/db
      - ./secrets/keyfile:/run/secrets/keyfile:ro
      - ./scripts:/scripts:ro

  s3c:
    image: mongo:8.0
    container_name: s3c
    entrypoint: ["/bin/bash", "/scripts/setup-keyfile.sh"]
    command: ["mongod", "--shardsvr", "--replSet", "shard3RS", "--port", "27018", "--bind_ip_all", "--keyFile", "/etc/mongo/keyfile"]
    volumes:
      - s3c_data:/data/db
      - ./secrets/keyfile:/run/secrets/keyfile:ro
      - ./scripts:/scripts:ro

  mongos:
    image: mongo:8.0
    container_name: mongos
    depends_on:
      - cfg1
      - cfg2
      - cfg3
    entrypoint: ["/bin/bash", "/scripts/start-mongos.sh"]
    ports:
      - "27017:27017"
    volumes:
      - ./data:/import:ro
      - ./scripts:/scripts:ro
      - ./secrets/keyfile:/run/secrets/keyfile:ro

  compass:
    image: haohanyang/compass-web:latest
    container_name: mongo-compass
    depends_on:
      - mongos
    ports:
      - "8080:8080"
    command: ["--mongo-uri", "mongodb://${MONGO_ADMIN_USER}:${MONGO_ADMIN_PASSWORD}@mongos:27017/?authSource=admin"]
    environment:
      MONGO_ADMIN_USER: "${MONGO_ADMIN_USER}"
      MONGO_ADMIN_PASSWORD: "${MONGO_ADMIN_PASSWORD}"
    restart: unless-stopped

  setup:
    image: mongo:8.0
    container_name: mongo-setup
    depends_on:
      - cfg1
      - cfg2
      - cfg3
      - s1a
      - s1b
      - s1c
      - s2a
      - s2b
      - s2c
      - s3a
      - s3b
      - s3c
      - mongos
    environment:
      MONGO_ADMIN_USER: "${MONGO_ADMIN_USER}"
      MONGO_ADMIN_PASSWORD: "${MONGO_ADMIN_PASSWORD}"
    volumes:
      - ./scripts/setup-cluster.sh:/scripts/setup-cluster.sh:ro
      - ./mongo-init:/mongo-init:ro
      - ./data:/import:ro
      - setup_state:/setup-state
    entrypoint: ["/bin/bash", "/scripts/setup-cluster.sh"]

volumes:
  cfg1_data:
  cfg2_data:
  cfg3_data:
  s1a_data:
  s1b_data:
  s1c_data:
  s2a_data:
  s2b_data:
  s2c_data:
  s3a_data:
  s3b_data:
  s3c_data:
  setup_state:
